<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PIP-BOY // AI UNIVERSITY</title>
<style>
  :root{
    --green:#21ff9a; --green-dim:#15aa66; --green-faint:#0e3a26;
    --bg:#06120c; --panel:#0a1c12; --line:#1c6b45; --amber:#ffcf3a;
    --glow:0 0 6px rgba(33,255,154,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#020805}
  body{font-family:"Courier New",ui-monospace,Menlo,Consolas,monospace;
    color:var(--green);max-width:1040px;margin:0 auto;padding:20px 16px 70px;
    text-shadow:var(--glow);letter-spacing:.04em}
  /* CRT screen frame */
  .screen{position:relative;background:
      radial-gradient(120% 90% at 50% 0%, #0c2417 0%, var(--bg) 70%);
    border:2px solid var(--line);border-radius:16px;padding:18px 20px 26px;
    box-shadow:0 0 0 4px #04140c, 0 0 40px rgba(33,255,154,.12) inset, 0 0 60px rgba(0,0,0,.8)}
  /* scanlines + flicker */
  .screen::before{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.18) 0px, rgba(0,0,0,.18) 1px, transparent 2px, transparent 4px);
    mix-blend-mode:multiply;z-index:50}
  .screen::after{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
    background:rgba(33,255,154,.03);animation:flick 6s infinite steps(60);z-index:49}
  @keyframes flick{0%,97%{opacity:.0}98%{opacity:.5}100%{opacity:0}}
  a{color:var(--green);text-decoration:none}
  /* header */
  .top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);
    padding-bottom:8px;margin-bottom:10px;font-size:13px;text-transform:uppercase}
  .top .brand{font-size:18px;font-weight:bold}
  .top .sys{opacity:.8;text-align:right;line-height:1.4}
  /* tabs */
  .tabs{display:flex;gap:0;border-bottom:2px solid var(--line);margin-bottom:18px}
  .tab{flex:0 0 auto;padding:8px 18px;cursor:pointer;text-transform:uppercase;font-size:14px;
    border:1px solid transparent;border-bottom:none;opacity:.55;user-select:none}
  .tab.active{opacity:1;background:var(--green-faint);border-color:var(--line);
    border-top-left-radius:8px;border-top-right-radius:8px}
  .tab:hover{opacity:.9}
  section{display:none}
  section.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  /* status / vault boy */
  .statusrow{display:flex;gap:24px;flex-wrap:wrap;align-items:center}
  .vault{flex:0 0 auto;width:150px;height:150px;border:2px solid var(--line);border-radius:12px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--green-faint)}
  .vault .face{font-size:62px;line-height:1}
  .vault .vnum{font-size:12px;margin-top:6px;letter-spacing:.12em;opacity:.85}
  .statbox{flex:1;min-width:260px}
  .bigline{font-size:26px;font-weight:bold;text-transform:uppercase}
  .lvltrack{height:18px;border:1px solid var(--line);border-radius:4px;overflow:hidden;
    background:#04140c;margin:8px 0 4px}
  .lvlfill{height:100%;width:0;background:
      repeating-linear-gradient(90deg,var(--green) 0 8px,var(--green-dim) 8px 10px);transition:width .5s}
  .mini{font-size:13px;opacity:.85;text-transform:uppercase}
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:18px}
  .stat-mini{border:1px solid var(--line);border-radius:8px;padding:10px 12px;text-align:center}
  .stat-mini b{font-size:24px;display:block}
  .stat-mini span{font-size:11px;opacity:.8;text-transform:uppercase}
  @media(max-width:620px){.cards3{grid-template-columns:repeat(2,1fr)}}
  /* SPECIAL */
  .special{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sp{border:1px solid var(--line);border-radius:10px;padding:12px 14px;display:flex;gap:14px;align-items:center;
    background:linear-gradient(180deg,var(--green-faint),transparent)}
  .sp .letter{flex:0 0 auto;width:46px;height:46px;border:2px solid var(--green);border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold}
  .sp .body{flex:1}
  .sp .name{font-size:14px;font-weight:bold;text-transform:uppercase;display:flex;justify-content:space-between}
  .sp .name .val{color:var(--amber)}
  .sp .ru{font-size:12px;opacity:.75;margin:1px 0 6px}
  .pips{display:flex;gap:3px}
  .pip{flex:1;height:9px;border:1px solid var(--green-dim);border-radius:2px;background:#04140c}
  .pip.on{background:var(--green);box-shadow:var(--glow)}
  .sp .src{font-size:10px;opacity:.55;text-transform:uppercase;margin-top:5px}
  @media(max-width:620px){.special{grid-template-columns:1fr}}
  /* SKILLS */
  .skill{border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px}
  .skhead{display:flex;align-items:center;gap:12px}
  .semoji{font-size:26px}
  .stitle{font-size:18px;font-weight:bold;text-transform:uppercase}
  .ssub{font-size:12px;opacity:.7}
  .sbadge{margin-left:auto;border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--amber)}
  .strack{height:10px;border:1px solid var(--line);border-radius:4px;overflow:hidden;background:#04140c;margin:10px 0 3px}
  .sfill{height:100%;width:0;background:repeating-linear-gradient(90deg,var(--green) 0 6px,var(--green-dim) 6px 8px);transition:width .4s}
  .lrow{display:flex;gap:9px;align-items:center;padding:5px 0;font-size:14px}
  .lrow input{width:16px;height:16px;accent-color:var(--green);cursor:pointer}
  .lrow .done a{opacity:.5;text-decoration:line-through}
  .reflist{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .reflist a{font-size:12px;border:1px solid var(--line);border-radius:6px;padding:3px 9px;text-transform:uppercase}
  .reflist a:hover{background:var(--green-faint)}
  .open{display:inline-block;margin-top:12px;border:1px solid var(--green);border-radius:7px;
    padding:7px 14px;font-size:13px;text-transform:uppercase}
  .open:hover{background:var(--green-faint)}
  .foot{margin-top:18px;display:flex;justify-content:space-between;align-items:center;font-size:12px;opacity:.7}
  button.reset{font-family:inherit;background:transparent;border:1px solid var(--line);color:var(--green);
    border-radius:6px;padding:6px 12px;cursor:pointer;text-shadow:var(--glow)}
  button.reset:hover{background:var(--green-faint)}
  .blink{animation:blink 1.2s steps(2) infinite}
  @keyframes blink{50%{opacity:0}}
</style>
</head>
<body>
<div class="screen">

  <div class="top">
    <div class="brand">PIP-BOY 3000 · AI UNIVERSITY</div>
    <div class="sys">
      <div id="sysDate">--</div>
      <div>VAULT 2026 · DWELLER: BARUH</div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="status">STATUS</div>
    <div class="tab" data-tab="special">S.P.E.C.I.A.L.</div>
    <div class="tab" data-tab="skills">SKILLS</div>
  </div>

  <!-- STATUS -->
  <section id="status" class="active">
    <div class="statusrow">
      <div class="vault">
        <div class="face" id="vaultFace">👍</div>
        <div class="vnum">LVL <span id="vLevel">1</span></div>
      </div>
      <div class="statbox">
        <div class="bigline">Уровень <span id="level">1</span> · <span id="rank">Стажёр убежища</span></div>
        <div class="lvltrack"><div class="lvlfill" id="xpFill"></div></div>
        <div class="mini" id="xpText">0 XP</div>
        <div class="mini" style="margin-top:8px">Серия: <span id="streak" style="color:var(--amber)">0</span> дн. <span class="blink">▮</span></div>
      </div>
    </div>
    <div class="cards3">
      <div class="stat-mini"><b id="stCourses">0</b><span>квестов активно</span></div>
      <div class="stat-mini"><b id="stLessons">0</b><span>уроков пройдено</span></div>
      <div class="stat-mini"><b id="stTotal">0</b><span>уроков всего</span></div>
    </div>
  </section>

  <!-- SPECIAL -->
  <section id="special">
    <div class="special" id="specialGrid"></div>
  </section>

  <!-- SKILLS -->
  <section id="skills">
    <div id="skillList"></div>
  </section>

  <div class="foot">
    <span>// localStorage · 1 урок = 100 XP · уровень каждые 300 XP</span>
    <button class="reset" id="reset">RESET DWELLER</button>
  </div>

</div>

<script>
const COURSES = [
  { id:"senior-2026", emoji:"🏛️", title:"Senior 2026", sub:"Системный дизайн и архитектура",
    primary:{label:"Открыть дорожную карту", href:"courses/senior-2026/reference/dorozhnaya-karta-2026.html"},
    lessons:[ {n:"0001", t:"Путь запроса: от логина до списка", href:"courses/senior-2026/lessons/0001-put-zaprosa.html"} ],
    refs:[ {t:"Дорожная карта", href:"courses/senior-2026/reference/dorozhnaya-karta-2026.html"},
           {t:"Расписание дня", href:"courses/senior-2026/reference/raspisanie-dnya.html"},
           {t:"Трекер фаз", href:"courses/senior-2026/reference/progress-tracker.html"},
           {t:"Глоссарий", href:"courses/senior-2026/reference/glossary.html"} ] },
  { id:"english", emoji:"🗣️", title:"Английский", sub:"Читать доки и писать свободно",
    primary:{label:"Открыть последний урок", href:"courses/english/lessons/0002-artikli-a-an-the.html"},
    lessons:[ {n:"0001", t:"Диагностика: точка старта", href:"courses/english/lessons/0001-diagnostika-tochka-starta.html"},
              {n:"0002", t:"Артикли a / an / the", href:"courses/english/lessons/0002-artikli-a-an-the.html"} ],
    refs:[ {t:"Артикли", href:"courses/english/reference/artikli.html"},
           {t:"Уровни CEFR", href:"courses/english/reference/cefr-urovni.html"} ] },
  { id:"css-grid", emoji:"🎨", title:"CSS Grid", sub:"Двумерные раскладки без хаков",
    primary:{label:"Открыть последний урок", href:"courses/css-grid/lessons/0002-razmeshchenie-elementov.html"},
    lessons:[ {n:"0001", t:"Основы CSS Grid", href:"courses/css-grid/lessons/0001-osnovy-css-grid.html"},
              {n:"0002", t:"Размещение элементов", href:"courses/css-grid/lessons/0002-razmeshchenie-elementov.html"} ],
    refs:[ {t:"Справочник Grid", href:"courses/css-grid/reference/grid-spravochnik.html"} ] },
  { id:"chtenie", emoji:"📖", title:"Чтение (сын)", sub:"Учим сына читать · ведёт родитель",
    primary:{label:"Открыть последний урок", href:"courses/chtenie/lessons/0002-begushchiy-palchik.html"},
    lessons:[ {n:"0001", t:"Звук, а не имя", href:"courses/chtenie/lessons/0001-zvuk-ne-imya.html"},
              {n:"0002", t:"Бегущий пальчик", href:"courses/chtenie/lessons/0002-begushchiy-palchik.html"} ],
    refs:[ {t:"Памятка родителю", href:"courses/chtenie/reference/pamyatka-roditelyu.html"},
           {t:"Слоговая таблица", href:"courses/chtenie/reference/slogovaya-tablica.html"} ] },
];

const SPECIAL = [
  {k:"S", name:"STRENGTH",     ru:"Бэкенд-сила",      src:"senior-2026", note:"← Senior 2026"},
  {k:"P", name:"PERCEPTION",   ru:"Насмотренность",   src:"css-grid",    note:"← CSS Grid"},
  {k:"E", name:"ENDURANCE",    ru:"Постоянство",      src:"streak",      note:"← серия дней"},
  {k:"C", name:"CHARISMA",     ru:"Английский",       src:"english",     note:"← English"},
  {k:"I", name:"INTELLIGENCE", ru:"Системный дизайн", src:"overall",     note:"← все курсы"},
  {k:"A", name:"AGILITY",      ru:"Темп прокачки",    src:"pace",        note:"← всего уроков"},
  {k:"L", name:"LUCK",         ru:"Папа-режим",       src:"chtenie",     note:"← Чтение (сын)"},
];

const RANKS = ["Стажёр убежища","Падаван","Подмастерье","Странник","Искатель",
  "Ветеран","Архитектор","Мастер","Оверсир","Легенда Пустоши"];

const XP_PER_LESSON=100, XP_PER_LEVEL=300, KEY="aiuni_pipboy_v1";
const store = JSON.parse(localStorage.getItem(KEY) || '{"lessons":{},"meta":{}}');
if(!store.lessons) store.lessons={}; if(!store.meta) store.meta={};
const save = ()=> localStorage.setItem(KEY, JSON.stringify(store));
const lk = (cid,n)=> cid+"/"+n;

// ---- date helpers for streak ----
const dstr = d => d.toISOString().slice(0,10);
function touchStreak(){
  const today = dstr(new Date());
  const y = new Date(); y.setDate(y.getDate()-1); const yest = dstr(y);
  if(store.meta.lastActive === today) return;
  if(store.meta.lastActive === yest) store.meta.streak = (store.meta.streak||0)+1;
  else store.meta.streak = 1;
  store.meta.lastActive = today; save();
}
function currentStreak(){
  if(!store.meta.lastActive) return 0;
  const today=dstr(new Date()); const y=new Date(); y.setDate(y.getDate()-1);
  if(store.meta.lastActive===today || store.meta.lastActive===dstr(y)) return store.meta.streak||0;
  return 0; // streak broken
}

// ---- build tabs ----
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    t.classList.add("active");
    document.getElementById(t.dataset.tab).classList.add("active");
  });
});

// ---- build SKILLS ----
const skillList=document.getElementById("skillList");
COURSES.forEach(c=>{
  const el=document.createElement("div"); el.className="skill";
  el.innerHTML=`<div class="skhead">
      <span class="semoji">${c.emoji}</span>
      <div><div class="stitle">${c.title}</div><div class="ssub">${c.sub}</div></div>
      <span class="sbadge" data-badge>0/0</span></div>
    <div class="strack"><div class="sfill" data-fill></div></div>
    <div class="mini" data-pct></div>
    <div data-lessons style="margin-top:8px"></div>`;
  const lwrap=el.querySelector("[data-lessons]");
  c.lessons.forEach(l=>{
    const row=document.createElement("div"); row.className="lrow";
    const k=lk(c.id,l.n);
    const cb=document.createElement("input"); cb.type="checkbox"; cb.checked=!!store.lessons[k];
    const sp=document.createElement("span"); sp.innerHTML=`<a href="${l.href}" target="_blank">${l.n} · ${l.t}</a>`;
    if(cb.checked) sp.classList.add("done");
    cb.addEventListener("change",()=>{
      store.lessons[k]=cb.checked; sp.classList.toggle("done",cb.checked);
      if(cb.checked) touchStreak();
      save(); refresh();
    });
    row.appendChild(cb); row.appendChild(sp); lwrap.appendChild(row);
  });
  if(c.refs && c.refs.length){
    const rl=document.createElement("div"); rl.className="reflist";
    c.refs.forEach(r=>{ const a=document.createElement("a"); a.href=r.href; a.target="_blank"; a.textContent=r.t; rl.appendChild(a); });
    el.appendChild(rl);
  }
  const open=document.createElement("a"); open.className="open"; open.href=c.primary.href; open.target="_blank";
  open.textContent="▶ "+c.primary.label; el.appendChild(open);
  skillList.appendChild(el);
});

// ---- build SPECIAL skeleton ----
const specGrid=document.getElementById("specialGrid");
SPECIAL.forEach(s=>{
  const el=document.createElement("div"); el.className="sp";
  let pips=""; for(let i=0;i<10;i++) pips+=`<div class="pip" data-i="${i}"></div>`;
  el.innerHTML=`<div class="letter">${s.k}</div>
    <div class="body">
      <div class="name"><span>${s.name}</span><span class="val" data-val>1</span></div>
      <div class="ru">${s.ru}</div>
      <div class="pips" data-pips>${pips}</div>
      <div class="src">${s.note}</div>
    </div>`;
  el.dataset.src=s.src; specGrid.appendChild(el);
});

function courseFrac(id){
  const c=COURSES.find(x=>x.id===id); if(!c||!c.lessons.length) return 0;
  const done=c.lessons.filter(l=>store.lessons[lk(id,l.n)]).length;
  return done/c.lessons.length;
}
function totalDoneCount(){
  let n=0; COURSES.forEach(c=>c.lessons.forEach(l=>{ if(store.lessons[lk(c.id,l.n)]) n++; })); return n;
}
function statValue(src){
  const clamp=v=>Math.max(1,Math.min(10,v));
  if(src==="streak") return clamp(1+currentStreak());
  if(src==="pace")   return clamp(1+totalDoneCount());
  if(src==="overall"){ const avg=COURSES.reduce((a,c)=>a+courseFrac(c.id),0)/COURSES.length; return clamp(1+Math.round(avg*9)); }
  return clamp(1+Math.round(courseFrac(src)*9));
}

function refresh(){
  // skills
  let totalLessons=0,totalDone=0,active=0;
  COURSES.forEach((c,i)=>{
    const card=skillList.children[i];
    const done=c.lessons.filter(l=>store.lessons[lk(c.id,l.n)]).length, tot=c.lessons.length;
    totalLessons+=tot; totalDone+=done; if(done>0) active++;
    const pct=tot?Math.round(done/tot*100):0;
    card.querySelector("[data-fill]").style.width=pct+"%";
    card.querySelector("[data-pct]").textContent=`${done}/${tot} уроков · ${pct}%`;
    card.querySelector("[data-badge]").textContent= (done===tot&&tot)?"DONE ✓":`${done}/${tot}`;
  });
  // special
  document.querySelectorAll("#specialGrid .sp").forEach(el=>{
    const v=statValue(el.dataset.src);
    el.querySelector("[data-val]").textContent=v;
    el.querySelectorAll(".pip").forEach((p,idx)=>p.classList.toggle("on", idx<v));
  });
  // status
  const xp=totalDone*XP_PER_LESSON;
  const level=Math.floor(xp/XP_PER_LEVEL)+1;
  const into=xp%XP_PER_LEVEL, pctL=Math.round(into/XP_PER_LEVEL*100);
  document.getElementById("level").textContent=level;
  document.getElementById("vLevel").textContent=level;
  document.getElementById("rank").textContent=RANKS[Math.min(level-1,RANKS.length-1)];
  document.getElementById("xpFill").style.width=pctL+"%";
  document.getElementById("xpText").textContent=`${xp} XP · до ур.${level+1}: ${XP_PER_LEVEL-into} XP`;
  document.getElementById("streak").textContent=currentStreak();
  document.getElementById("stCourses").textContent=active;
  document.getElementById("stLessons").textContent=totalDone;
  document.getElementById("stTotal").textContent=totalLessons;
  const faces=["👍","🙂","😎","🤓","🧠","🦾","🚀","🏆","👑","🐉"];
  document.getElementById("vaultFace").textContent=faces[Math.min(level-1,faces.length-1)];
}

document.getElementById("sysDate").textContent =
  new Date().toLocaleString("ru-RU",{weekday:"short",day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}).toUpperCase();

document.getElementById("reset").addEventListener("click",()=>{
  if(confirm("Сбросить персонажа? Прогресс и серия обнулятся.")){localStorage.removeItem(KEY);location.reload();}
});

refresh();
</script>
</body>
</html>
