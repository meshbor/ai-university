<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI University · лист навыков</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  /* ============ THEME VARIABLES ============ */
  body{
    --page-bg:#eee; --bg:#fff; --panel:#fff; --panel2:#f7f7fb;
    --ink:#1a1a2e; --muted:#6b6b80; --line:#e6e4ef;
    --accent:#7a4f9e; --accent2:#2e6e8e; --xp:#7a4f9e; --xp2:#2e6e8e; --on:#7a4f9e;
    --font:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --radius:16px; --glow:none; --tt:none; --shadow:0 4px 14px rgba(40,30,70,.08);
    --frame:1px solid var(--line);
  }
  body[data-theme="light"]{
    --page-bg:linear-gradient(180deg,#efeaf7,#f6f4fb 320px);
  }
  body[data-theme="fallout"]{
    --page-bg:#020805; --bg:radial-gradient(120% 90% at 50% 0%, #0c2417 0%, #06120c 70%);
    --panel:#0a1c12; --panel2:#0e2417;
    --ink:#21ff9a; --muted:#15aa66; --line:#1c6b45;
    --accent:#21ff9a; --accent2:#15aa66; --xp:#ffcf3a; --xp2:#15aa66; --on:#21ff9a;
    --font:"Courier New",ui-monospace,Menlo,Consolas,monospace;
    --radius:14px; --glow:0 0 6px rgba(33,255,154,.5); --tt:uppercase;
    --shadow:0 0 40px rgba(33,255,154,.1) inset, 0 0 0 4px #04140c;
    --frame:2px solid var(--line);
  }
  body[data-theme="space"]{
    --page-bg:transparent;
    --bg:linear-gradient(180deg, rgba(18,30,72,.55), rgba(7,11,28,.75));
    --panel:rgba(16,28,66,.55); --panel2:rgba(22,38,86,.45);
    --ink:#dbe7ff; --muted:#8298cf; --line:#28407e;
    --accent:#36d6ff; --accent2:#8a6bff; --xp:#36d6ff; --xp2:#8a6bff; --on:#36d6ff;
    --font:"Segoe UI",system-ui,-apple-system,sans-serif;
    --radius:14px; --glow:0 0 8px rgba(54,214,255,.4); --tt:none;
    --shadow:0 0 0 1px rgba(54,214,255,.25), 0 0 40px rgba(54,214,255,.12), 0 10px 40px rgba(0,0,0,.6);
    --frame:1px solid var(--line);
  }
  body[data-theme="wot"]{
    --page-bg:transparent;
    --bg:linear-gradient(180deg, rgba(32,30,22,.72), rgba(18,16,12,.88));
    --panel:rgba(38,36,28,.62); --panel2:rgba(48,44,34,.55);
    --ink:#e8e2d0; --muted:#9a9478; --line:#5c5844;
    --accent:#c9a227; --accent2:#8b7355; --xp:#e8b923; --xp2:#a08030; --on:#e8b923;
    --font:"Segoe UI",system-ui,-apple-system,sans-serif;
    --radius:10px; --glow:0 0 6px rgba(232,185,35,.35); --tt:none;
    --shadow:0 0 0 1px rgba(201,162,39,.2), 0 8px 32px rgba(0,0,0,.55);
    --frame:1px solid var(--line);
  }
  body[data-theme="knight"]{
    --page-bg:transparent;
    --bg:linear-gradient(180deg, rgba(42,36,30,.7), rgba(22,18,14,.85));
    --panel:rgba(48,40,32,.6); --panel2:rgba(58,48,38,.5);
    --ink:#f0e6d6; --muted:#a89880; --line:#6a5a48;
    --accent:#d4a84b; --accent2:#8b6914; --xp:#e8c060; --xp2:#a07828; --on:#e8c060;
    --font:"Segoe UI",system-ui,-apple-system,sans-serif;
    --radius:12px; --glow:0 0 6px rgba(212,168,75,.35); --tt:none;
    --shadow:0 0 0 1px rgba(212,168,75,.18), 0 8px 32px rgba(0,0,0,.5);
    --frame:1px solid var(--line);
  }
  body[data-theme="samurai"]{
    --page-bg:transparent;
    --bg:linear-gradient(180deg, rgba(52,28,28,.65), rgba(28,14,14,.82));
    --panel:rgba(58,32,32,.58); --panel2:rgba(72,38,38,.48);
    --ink:#ffe8e0; --muted:#c09088; --line:#7a4848;
    --accent:#e85a4f; --accent2:#c43830; --xp:#ff7060; --xp2:#d04038; --on:#ff7060;
    --font:"Segoe UI",system-ui,-apple-system,sans-serif;
    --radius:12px; --glow:0 0 6px rgba(232,90,79,.35); --tt:none;
    --shadow:0 0 0 1px rgba(232,90,79,.2), 0 8px 32px rgba(0,0,0,.5);
    --frame:1px solid var(--line);
  }

  body{font-family:var(--font);background:var(--page-bg);min-height:100vh;color:var(--ink);
    max-width:1280px;margin:0 auto;padding:0 16px 80px;transition:background .3s}

  /* ============ COCKPIT BACKGROUND (space theme only) ============ */
  .cockpit{position:fixed;inset:0;z-index:-1;display:none;pointer-events:none;
    background:#03050f center/cover no-repeat;
    background-image:linear-gradient(rgba(3,5,15,.30),rgba(3,5,15,.55)),url("assets/space-cockpit.png")}
  body[data-theme="space"] .cockpit{display:block}
  body[data-theme="space"] .screen{backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}

  /* ============ HANGAR BACKGROUND (WoT theme only) ============ */
  .hangar{position:fixed;inset:0;z-index:-1;display:none;pointer-events:none;
    background:#14120c center/cover no-repeat;
    background-image:linear-gradient(rgba(20,18,12,.32),rgba(10,9,6,.58)),url("assets/wot-hangar.png")}
  body[data-theme="wot"] .hangar{display:block}
  body[data-theme="wot"] .screen,
  body[data-theme="wot"] .hero-panel{backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}

  .knight-bg,.dojo{position:fixed;inset:0;z-index:-1;display:none;pointer-events:none;
    background:#14100c center/cover no-repeat}
  .knight-bg{background-image:linear-gradient(rgba(20,16,12,.35),rgba(10,8,6,.6)),url("assets/knight-hall.png")}
  .dojo{background-image:linear-gradient(rgba(40,18,18,.35),rgba(18,8,8,.58)),url("assets/samurai-dojo.png")}
  body[data-theme="knight"] .knight-bg{display:block}
  body[data-theme="samurai"] .dojo{display:block}
  body[data-theme="knight"] .screen,
  body[data-theme="knight"] .hero-panel,
  body[data-theme="samurai"] .screen,
  body[data-theme="samurai"] .hero-panel{backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}

  /* ============ TOOLBAR (always readable) ============ */
  .toolbar{position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;
    gap:12px;flex-wrap:wrap;background:#13151f;color:#e8e8f0;border-radius:0 0 14px 14px;
    padding:10px 16px;margin-bottom:18px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
  .toolbar .logo{font-weight:bold;font-size:16px;letter-spacing:.02em;font-family:-apple-system,"Segoe UI",sans-serif}
  .themepick{display:flex;align-items:center;gap:6px;font-size:13px;font-family:-apple-system,"Segoe UI",sans-serif}
  .themepick .lbl{opacity:.7;margin-right:4px}
  .tbtn{background:#23263a;color:#cfd2e6;border:1px solid #343852;border-radius:8px;
    padding:6px 12px;cursor:pointer;font-size:13px;font-family:inherit}
  .tbtn:hover{background:#2c3050}
  .tbtn.active{background:#6c8cff;color:#fff;border-color:#6c8cff}

  /* ============ SCREEN ============ */
  .screen{position:relative;background:var(--bg);border:var(--frame);border-radius:var(--radius);
    padding:18px 20px 26px;box-shadow:var(--shadow);text-shadow:var(--glow);overflow:hidden}
  a{color:var(--accent);text-decoration:none;text-shadow:var(--glow)}

  /* decorations */
  .scanlines,.starfield{position:absolute;inset:0;border-radius:var(--radius);pointer-events:none;display:none;z-index:40}
  body[data-theme="fallout"] .scanlines{display:block;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,.18) 0 1px,transparent 2px 4px);mix-blend-mode:multiply}
  body[data-theme="space"] .starfield{display:block;
    background-image:
      radial-gradient(1.5px 1.5px at 20px 30px,#fff,transparent),
      radial-gradient(1px 1px at 120px 80px,#cfe6ff,transparent),
      radial-gradient(1.5px 1.5px at 240px 160px,#fff,transparent),
      radial-gradient(1px 1px at 330px 60px,#9fd0ff,transparent),
      radial-gradient(1px 1px at 420px 220px,#fff,transparent),
      radial-gradient(1.5px 1.5px at 520px 120px,#bcd9ff,transparent);
    background-repeat:repeat;background-size:600px 300px;opacity:.6;animation:drift 90s linear infinite}
  @keyframes drift{from{background-position:0 0}to{background-position:600px 300px}}
  .screen>*{position:relative;z-index:1}

  /* header */
  .top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:var(--frame);
    padding-bottom:8px;margin-bottom:14px;font-size:13px;text-transform:var(--tt)}
  .top .brand{font-size:18px;font-weight:bold}
  .top .sys{opacity:.85;text-align:right;line-height:1.45}

  /* dashboard: рубка слева, контент справа */
  .dashboard{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:20px;align-items:start}
  @media(max-width:920px){.dashboard{grid-template-columns:1fr}}

  .hero-panel{position:sticky;top:68px;background:var(--panel);border:var(--frame);border-radius:var(--radius);
    padding:16px;box-shadow:var(--shadow);text-shadow:var(--glow)}
  @media(max-width:920px){.hero-panel{position:static}}

  .avatar{width:100%;aspect-ratio:4/3;min-height:240px;border:var(--frame);border-radius:14px;background:var(--panel2);
    overflow:hidden;position:relative;margin-bottom:14px}
  .avatar .face-img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .35s, transform .35s}
  .avatar model-viewer{width:100%;height:100%;display:none;background:transparent;--poster-color:transparent}
  .avatar.avatar-3d{background:radial-gradient(ellipse at 50% 80%, var(--panel2), transparent 70%)}
  .avatar.avatar-3d model-viewer{display:block}
  .avatar.avatar-3d .face-img{display:none}
  .avatar.flash .face-img{animation:portraitPop .45s ease}
  @keyframes portraitPop{0%{opacity:.6;transform:scale(1.03)}100%{opacity:1;transform:scale(1)}}
  .avatar .vnum{position:absolute;left:10px;bottom:10px;font-size:13px;letter-spacing:.1em;
    background:rgba(0,0,0,.65);color:#fff;padding:4px 10px;border-radius:6px;text-transform:var(--tt);text-shadow:none}
  .avatar .vtier{position:absolute;right:10px;top:10px;font-size:12px;letter-spacing:.08em;
    background:rgba(0,0,0,.6);color:var(--xp);padding:3px 10px;border-radius:6px;text-transform:var(--tt);text-shadow:none}
  .bigline{font-size:22px;font-weight:bold;text-transform:var(--tt);line-height:1.25}
  .lvltrack{height:18px;border:var(--frame);border-radius:6px;overflow:hidden;background:var(--panel2);margin:10px 0 5px}
  .lvlfill{height:100%;width:0;background:linear-gradient(90deg,var(--xp),var(--xp2));transition:width .5s}
  .mini{font-size:13px;opacity:.85;text-transform:var(--tt)}
  .cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px}
  .stat-mini{border:var(--frame);border-radius:10px;padding:8px 6px;text-align:center;background:var(--panel2)}
  .stat-mini b{font-size:20px;display:block}
  .stat-mini span{font-size:10px;opacity:.8;text-transform:var(--tt);line-height:1.2}
  @media(max-width:420px){.cards3{grid-template-columns:repeat(3,1fr)}}

  /* wheel of life / radar */
  .balance{margin-top:16px;padding-top:14px;border-top:var(--frame)}
  .balance-hd{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:6px}
  .balance-hd b{font-size:13px;text-transform:var(--tt)}
  .balance-hd span{font-size:11px;opacity:.7}
  .radar-wrap{display:flex;justify-content:center;margin:4px 0 8px}
  .radar{width:100%;max-width:280px;height:auto;display:block}
  .radar .grid{stroke:var(--line);stroke-width:1;fill:none;opacity:.55}
  .radar .axis{stroke:var(--line);stroke-width:1;opacity:.35}
  .radar .fill{fill:var(--accent);opacity:.22;stroke:var(--accent);stroke-width:2;transition:d .4s}
  .radar .dot{fill:var(--xp);stroke:var(--panel);stroke-width:2}
  .radar .lbl{fill:var(--ink);font-size:11px;font-family:var(--font);text-anchor:middle;dominant-baseline:middle}
  .radar .lbl b{font-size:12px}
  .radar .lbl.dim{opacity:.55}
  .radar .lbl.weak{color:var(--xp);font-weight:bold}
  .balance-tip{font-size:11px;opacity:.8;line-height:1.35;text-transform:var(--tt)}
  .balance-tip em{font-style:normal;color:var(--xp);font-weight:bold}

  .main-panel{min-width:0}

  /* tabs */
  .tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
  .tab{padding:8px 18px;cursor:pointer;text-transform:var(--tt);font-size:14px;opacity:.55;
    border:1px solid transparent;border-bottom:none;user-select:none}
  .tab.active{opacity:1;background:var(--panel2);border-color:var(--line);border-radius:8px 8px 0 0}
  .tab:hover{opacity:.9}
  section{display:none}section.active{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0}to{opacity:1}}

  /* special */
  .special{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .sp{border:var(--frame);border-radius:12px;padding:12px 14px;display:flex;gap:14px;align-items:center;background:var(--panel)}
  .sp .letter{flex:0 0 auto;width:44px;height:44px;border:2px solid var(--accent);border-radius:8px;
    display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold}
  .sp .body{flex:1}
  .sp .name{font-size:14px;font-weight:bold;text-transform:uppercase;display:flex;justify-content:space-between}
  .sp .name .val{color:var(--xp)}
  .sp .ru{font-size:12px;opacity:.75;margin:1px 0 6px}
  .pips{display:flex;gap:3px}
  .pip{flex:1;height:9px;border:1px solid var(--line);border-radius:2px;background:var(--panel2)}
  .pip.on{background:var(--on);box-shadow:var(--glow)}
  .sp .src{font-size:10px;opacity:.55;text-transform:uppercase;margin-top:5px}
  @media(max-width:620px){.special{grid-template-columns:1fr}}

  /* skills */
  .skill{border:var(--frame);border-radius:12px;padding:14px 16px;margin-bottom:14px;background:var(--panel)}
  .skhead{display:flex;align-items:center;gap:12px}
  .semoji{font-size:26px}
  .stitle{font-size:18px;font-weight:bold;text-transform:var(--tt)}
  .ssub{font-size:12px;opacity:.7}
  .sbadge{margin-left:auto;border:var(--frame);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--xp)}
  .strack{height:10px;border:var(--frame);border-radius:5px;overflow:hidden;background:var(--panel2);margin:10px 0 3px}
  .sfill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
  .lrow{display:flex;gap:9px;align-items:center;padding:5px 0;font-size:14px}
  .lrow input{width:16px;height:16px;accent-color:var(--accent);cursor:pointer}
  .lrow .done a{opacity:.5;text-decoration:line-through}
  .reflist{display:flex;flex-wrap:wrap;gap:7px;margin-top:8px}
  .reflist a{font-size:12px;border:var(--frame);border-radius:6px;padding:3px 9px;text-transform:var(--tt)}
  .reflist a:hover{background:var(--panel2)}
  .open{display:inline-block;margin-top:12px;border:1px solid var(--accent);border-radius:8px;
    padding:8px 15px;font-size:13px;text-transform:var(--tt);background:var(--panel2)}
  .open:hover{background:var(--accent);color:#fff}

  .foot{margin-top:18px;display:flex;justify-content:space-between;align-items:center;font-size:12px;opacity:.7;flex-wrap:wrap;gap:8px}
  button.reset{font-family:inherit;background:transparent;border:var(--frame);color:var(--ink);
    border-radius:6px;padding:6px 12px;cursor:pointer;text-shadow:var(--glow)}
  button.reset:hover{background:var(--panel2)}
  .blink{animation:blink 1.2s steps(2) infinite}@keyframes blink{50%{opacity:0}}
</style>
</head>
<body data-theme="light">

  <div class="cockpit"></div>
  <div class="hangar"></div>
  <div class="knight-bg"></div>
  <div class="dojo"></div>

  <div class="toolbar">
    <div class="logo">🎓 AI University</div>
    <div class="themepick">
      <span class="lbl">Тема:</span>
      <button class="tbtn" data-theme-btn="light">☀️ Светлая</button>
      <button class="tbtn" data-theme-btn="fallout">📟 Pip-Boy</button>
      <button class="tbtn" data-theme-btn="space">🚀 Космос</button>
      <button class="tbtn" data-theme-btn="wot">🛡️ Танки</button>
      <button class="tbtn" data-theme-btn="knight">⚔️ Рыцарь</button>
      <button class="tbtn" data-theme-btn="samurai">🗡️ Самурай</button>
    </div>
  </div>

  <div class="screen">
    <div class="scanlines"></div>
    <div class="starfield"></div>

    <div class="top">
      <div class="brand" id="brand">AI University</div>
      <div class="sys">
        <div id="sysDate">--</div>
        <div id="sysWho">Игрок: Baruh</div>
      </div>
    </div>

    <div class="dashboard">
      <aside class="hero-panel" id="heroPanel">
        <div class="avatar" id="avatarBox">
          <img class="face-img" id="avatarImg" alt="портрет персонажа">
          <model-viewer id="avatar3d" alt="3D персонаж"
            camera-controls disable-zoom auto-rotate rotation-per-second="14deg"
            interaction-prompt="none" shadow-intensity="1" touch-action="pan-y"
            camera-orbit="0deg 78deg 2.4m" min-camera-orbit="auto auto 1.8m" max-camera-orbit="auto auto 3.2m"></model-viewer>
          <div class="vtier" id="vTier">T1</div>
          <div class="vnum">LVL <span id="vLevel">1</span></div>
        </div>
        <div class="bigline">Уровень <span id="level">1</span> · <span id="rank">Новичок</span></div>
        <div class="lvltrack"><div class="lvlfill" id="xpFill"></div></div>
        <div class="mini" id="xpText">0 XP</div>
        <div class="mini" style="margin-top:8px">Серия: <span id="streak" style="color:var(--xp)">0</span> дн. <span class="blink">▮</span></div>
        <div class="mini" style="margin-top:6px">Образ: <span id="archetype" style="color:var(--accent);font-weight:bold">—</span></div>
        <div class="cards3">
          <div class="stat-mini"><b id="stCourses">0</b><span>курсов</span></div>
          <div class="stat-mini"><b id="stLessons">0</b><span>пройдено</span></div>
          <div class="stat-mini"><b id="stTotal">0</b><span>всего</span></div>
        </div>
        <div class="balance">
          <div class="balance-hd">
            <b>Баланс жизни</b>
            <span>1–10</span>
          </div>
          <div class="radar-wrap">
            <svg class="radar" id="lifeRadar" viewBox="0 0 260 260" aria-label="Диаграмма баланса жизни"></svg>
          </div>
          <div class="balance-tip" id="lifeTip">—</div>
        </div>
      </aside>

      <div class="main-panel">
        <div class="tabs">
          <div class="tab" data-tab="special">Характеристики</div>
          <div class="tab active" data-tab="skills">Курсы</div>
        </div>

        <section id="special"><div class="special" id="specialGrid"></div></section>
        <section id="skills" class="active"><div id="skillList"></div></section>

        <div class="foot">
          <span>1 урок = 100 XP · уровень каждые 300 XP · прогресс в браузере</span>
          <button class="reset" id="reset">Сбросить прогресс</button>
        </div>
      </div>
    </div>
  </div>

<script>
const COURSES = [
  { id:"senior-2026", emoji:"🏛️", title:"Senior 2026", sub:"Системный дизайн и архитектура",
    primary:{label:"Открыть дорожную карту", href:"courses/senior-2026/reference/dorozhnaya-karta-2026.html"},
    lessons:[ {n:"0001", t:"Путь запроса: от логина до списка", href:"courses/senior-2026/lessons/0001-put-zaprosa.html"} ],
    refs:[ {t:"Дорожная карта", href:"courses/senior-2026/reference/dorozhnaya-karta-2026.html"},
           {t:"Расписание дня", href:"courses/senior-2026/reference/raspisanie-dnya.html"},
           {t:"Трекер фаз", href:"courses/senior-2026/reference/progress-tracker.html"},
           {t:"Глоссарий", href:"courses/senior-2026/reference/glossary.html"} ] },
  { id:"english", emoji:"🗣️", title:"Английский", sub:"Читать доки и писать свободно",
    primary:{label:"Открыть последний урок", href:"courses/english/lessons/0002-artikli-a-an-the.html"},
    lessons:[ {n:"0001", t:"Диагностика: точка старта", href:"courses/english/lessons/0001-diagnostika-tochka-starta.html"},
              {n:"0002", t:"Артикли a / an / the", href:"courses/english/lessons/0002-artikli-a-an-the.html"} ],
    refs:[ {t:"Артикли", href:"courses/english/reference/artikli.html"},

// Портреты по архетипу и тиру (T1=ур.1–3, T2=ур.4–6, T3=ур.7+). Отсутствующий тир → ниже.
const PORTRAITS={
  smart: {1:"assets/fallout-smart.png", 2:"assets/smart-t2.png", 3:"assets/smart-t3.png"},
  strong:{1:"assets/fallout-strong.png", 2:"assets/strong-t2.png", 3:"assets/strong-t3.png"},
  fast:  {1:"assets/space-fast.png",    2:"assets/fast-t2.png",  3:"assets/fast-t3.png"},
  gun:   {1:"assets/space-gun.png",     2:"assets/gun-t2.png",   3:"assets/gun-t3.png"},
  cargo: {1:"assets/space-cargo.png",   2:"assets/cargo-t2.png", 3:"assets/cargo-t3.png"},
  tank:  {1:"assets/tank-t1.png",       2:"assets/tank-t2.png",  3:"assets/tank-t3.png"},
};
const ARCH_LABELS={
  smart:"Умник в очках 🤓", strong:"Силач 💪",
  fast:"Быстрый разведчик 🚀", gun:"Боевой крейсер 🔫", cargo:"Грузовой транспорт 📦",
  tank:"Т-34 🛡️", knight:"Рыцарь ⚔️", samurai:"Самурай 🗡️",
};
const TIER_NAMES={
  light:  ["Стажёр","Специалист","Мастер"],
  fallout:["Убежище","Пустошь","Братство"],
  space:  ["Модуль","Усилен","Флагман"],
  wot:    ["Сток","Топ","Асс"],
  knight: ["Оруженосец","Рыцарь","Паладин"],
  samurai:["Ученик","Ронин","Кэнси"],
};

function levelTier(level){
  if(level>=7) return 3;
  if(level>=4) return 2;
  return 1;
}
function portraitSrc(theme, arch, tier){
  if(MODEL_THEMES.has(theme)){
    const map=MODELS[theme]||{};
    for(let t=tier;t>=1;t--) if(map[t]) return map[t];
    return map[1]||"";
  }
  const map=PORTRAITS[arch]||{};
  for(let t=tier;t>=1;t--) if(map[t]) return map[t];
  return map[1]||"";
}
// какой образ показывать в зависимости от доминирующей характеристики
function dominant(){
  const vals=SPECIAL.map(s=>statValue(s.src));
  const max=Math.max(...vals), min=Math.min(...vals);
  if(max===min) return null; // нет явного билда (нет прогресса)
  return SPECIAL.filter((s,i)=>vals[i]===max).map(s=>s.k);
}
function resolveArch(theme, L){
  if(theme==="wot") return "tank";
  if(theme==="knight") return "knight";
  if(theme==="samurai") return "samurai";
  if(theme==="space"){
    if(L){ if(L.includes("A")) return "fast";
           if(L.includes("S")) return "gun";
           if(L.includes("E")) return "cargo"; }
    return "fast";
  }
  if(L && L.includes("S")) return "strong";
  return "smart";
}
function pickPortrait(theme, level){
  const tier=levelTier(level), arch=resolveArch(theme, dominant());
  const tierName=(TIER_NAMES[theme]||TIER_NAMES.light)[tier-1];
  return {
    src:portraitSrc(theme, arch, tier), arch, tier, is3d:MODEL_THEMES.has(theme),
    label:`${tierName} · ${ARCH_LABELS[arch]}`,
  };
}
function applyPortrait(theme, p){
  const img=document.getElementById("avatarImg");
  const mv=document.getElementById("avatar3d");
  const box=document.getElementById("avatarBox");
  if(p.is3d){
    box.classList.add("avatar-3d");
    const cfg=(MODEL_TIER[theme]||{})[p.tier]||{};
    if(mv.getAttribute("src")!==p.src) mv.setAttribute("src",p.src);
    if(cfg.scale) mv.setAttribute("scale",cfg.scale);
    if(cfg.exposure) mv.setAttribute("exposure",cfg.exposure);
    if(cfg.orbit) mv.setAttribute("camera-orbit",cfg.orbit);
  }else{
    box.classList.remove("avatar-3d");
    if(img.getAttribute("src")!==p.src) img.src=p.src;
  }
}

const XP_PER_LESSON=100, XP_PER_LEVEL=300, KEY="aiuni_pipboy_v1", THEME_KEY="aiuni_theme";
const store = JSON.parse(localStorage.getItem(KEY) || '{"lessons":{},"meta":{}}');
if(!store.lessons) store.lessons={}; if(!store.meta) store.meta={};
const save = ()=> localStorage.setItem(KEY, JSON.stringify(store));
const lk = (cid,n)=> cid+"/"+n;

const dstr = d => d.toISOString().slice(0,10);
function touchStreak(){
  const today=dstr(new Date()); const y=new Date(); y.setDate(y.getDate()-1); const yest=dstr(y);
  if(store.meta.lastActive===today) return;
  if(store.meta.lastActive===yest) store.meta.streak=(store.meta.streak||0)+1; else store.meta.streak=1;
  store.meta.lastActive=today; save();
}
function currentStreak(){
  if(!store.meta.lastActive) return 0;
  const today=dstr(new Date()); const y=new Date(); y.setDate(y.getDate()-1);
  if(store.meta.lastActive===today||store.meta.lastActive===dstr(y)) return store.meta.streak||0;
  return 0;
}
// одноразовая миграция: 3 урока «Чтение» пройдены с ребёнком (июнь 2026)
if((store.meta.progressVer||0)<1){
  ["chtenie/0001","chtenie/0002","chtenie/0003"].forEach(k=>{store.lessons[k]=true;});
  store.meta.progressVer=1; touchStreak(); save();
}

// ---- build special ----
const specGrid=document.getElementById("specialGrid");

    <div class="name"><span>${s.name}</span><span class="val" data-val>1</span></div>

function courseFrac(id){
  const c=COURSES.find(x=>x.id===id); if(!c||!c.lessons.length) return 0;
  return c.lessons.filter(l=>store.lessons[lk(id,l.n)]).length/c.lessons.length;
}
function totalDoneCount(){let n=0;COURSES.forEach(c=>c.lessons.forEach(l=>{if(store.lessons[lk(c.id,l.n)])n++;}));return n;}
function clamp10(v){return Math.max(1,Math.min(10,v));}
function fracToScore(frac){return clamp10(1+Math.round(frac*9));}
function lifeScore(axis){
  const s=axis.src;
  if(s==="streak") return clamp10(1+currentStreak());
  if(Array.isArray(s)){
    const avg=s.reduce((a,id)=>a+courseFrac(id),0)/s.length;
    return fracToScore(avg);
  }
  return fracToScore(courseFrac(s));
}
function lifeScores(){return LIFE.map(a=>({...a, val:lifeScore(a)}));}

function drawLifeRadar(scores){
  const svg=document.getElementById("lifeRadar");
  const cx=130, cy=130, R=88, n=scores.length;
  const min=Math.min(...scores.map(s=>s.val));
  const weak=scores.filter(s=>s.val===min).map(s=>s.id);
  const ang=i=>-Math.PI/2+i*2*Math.PI/n;
  const pt=(i,v,r=R)=>{const a=ang(i);const rr=r*(v-1)/9;return[cx+rr*Math.cos(a),cy+rr*Math.sin(a)];};
  let h=`<polygon class="grid" points="${scores.map((_,i)=>pt(i,10).join(",")).join(" ")}"/>`;
  for(let g=2;g<=10;g+=2){
    h+=`<polygon class="grid" points="${scores.map((_,i)=>pt(i,g).join(",")).join(" ")}"/>`;
  }
  scores.forEach((_,i)=>{
    const [x,y]=pt(i,10); h+=`<line class="axis" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
  });
  const fill=scores.map((s,i)=>pt(i,s.val).join(",")).join(" ");
  h+=`<polygon class="fill" points="${fill}"/>`;
  scores.forEach((s,i)=>{
    const [x,y]=pt(i,s.val);
    h+=`<circle class="dot" cx="${x}" cy="${y}" r="4.5"/>`;
    const [lx,ly]=pt(i,10,1.22);
    const cls=["lbl", weak.includes(s.id)?"weak":""].filter(Boolean).join(" ");
    h+=`<text class="${cls}" x="${lx}" y="${ly}">${s.emoji} <tspan class="dim">${s.val}</tspan></text>`;
    const [tx,ty]=pt(i,10,1.38);
    h+=`<text class="lbl dim" x="${tx}" y="${ty}" style="font-size:10px">${s.label}</text>`;
  });
  svg.innerHTML=h;
  const weakLbl=scores.filter(s=>weak.includes(s.id)).map(s=>`${s.emoji} ${s.label} (${s.val})`).join(", ");
  document.getElementById("lifeTip").innerHTML=
    min<6?`Просадка: <em>${weakLbl}</em>`:`Баланс ровный · слабее всего: <em>${weakLbl}</em>`;
}

function statValue(src){
  if(src==="streak") return clamp10(1+currentStreak());
  if(src==="pace")   return clamp10(1+totalDoneCount());
  if(src==="overall"){const avg=COURSES.reduce((a,c)=>a+courseFrac(c.id),0)/COURSES.length;return fracToScore(avg);}
  return fracToScore(courseFrac(src));
}

function refresh(){
  const theme=document.body.dataset.theme, cfg=THEMES[theme];
  let totalLessons=0,totalDone=0,active=0;
  COURSES.forEach((c,i)=>{
    const card=skillList.children[i];
    const done=c.lessons.filter(l=>store.lessons[lk(c.id,l.n)]).length, tot=c.lessons.length;
    totalLessons+=tot; totalDone+=done; if(done>0) active++;
    const pct=tot?Math.round(done/tot*100):0;
    card.querySelector("[data-fill]").style.width=pct+"%";
    card.querySelector("[data-pct]").textContent=`${done}/${tot} уроков · ${pct}%`;
    card.querySelector("[data-badge]").textContent=(done===tot&&tot)?"✓":`${done}/${tot}`;
  });
  document.querySelectorAll("#specialGrid .sp").forEach(el=>{
    const v=statValue(el.dataset.src);
    el.querySelector("[data-val]").textContent=v;
    el.querySelectorAll(".pip").forEach((p,idx)=>p.classList.toggle("on",idx<v));
  });
  const xp=totalDone*XP_PER_LESSON, level=Math.floor(xp/XP_PER_LEVEL)+1;
  const into=xp%XP_PER_LEVEL, pctL=Math.round(into/XP_PER_LEVEL*100);
  document.getElementById("level").textContent=level;
  document.getElementById("vLevel").textContent=level;
  document.getElementById("rank").textContent=cfg.ranks[Math.min(level-1,cfg.ranks.length-1)];
  document.getElementById("xpFill").style.width=pctL+"%";
  document.getElementById("xpText").textContent=`${xp} XP · до ур.${level+1}: ${XP_PER_LEVEL-into} XP`;
  document.getElementById("streak").textContent=currentStreak();
  document.getElementById("stCourses").textContent=active;
  document.getElementById("stLessons").textContent=totalDone;
  document.getElementById("stTotal").textContent=totalLessons;
  const p=pickPortrait(theme, level);
  const box=document.getElementById("avatarBox");
  const portraitChanged=box.dataset.src!==p.src
    || box.dataset.tier!==String(p.tier) || box.dataset.level!==String(level);
  if(portraitChanged){
    applyPortrait(theme, p);
    box.dataset.src=p.src; box.dataset.tier=p.tier; box.dataset.level=level;
    box.classList.remove("flash"); void box.offsetWidth; box.classList.add("flash");
  }
  document.getElementById("archetype").textContent=p.label;
  document.getElementById("vTier").textContent="T"+p.tier;
  drawLifeRadar(lifeScores());
}

  document.querySelector('[data-tab="special"]').textContent=cfg.tabs.special;
  document.querySelector('[data-tab="skills"]').textContent=cfg.tabs.skills;
  refresh();
}

});

document.getElementById("reset").addEventListener("click",()=>{

});

applyTheme(localStorage.getItem(THEME_KEY) || "light");
