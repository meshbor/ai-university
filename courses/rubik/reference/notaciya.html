<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Справочник · Нотация 3×3</title>
<style>
  :root { --ink: #1a1a1a; --paper: #fffff8; --accent: #6b2d8a; }
  body { font-family: Georgia, serif; background: var(--paper); color: var(--ink); max-width: 40rem; margin: 0 auto; padding: 2.5rem 1.5rem; line-height: 1.6; }
  h1 { font-size: 1.6rem; font-style: italic; font-weight: 400; }
  code { background: #f0ede2; padding: 0.1em 0.35em; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
  th, td { border: 1px solid #ddd; padding: 0.45rem 0.6rem; }
</style>
</head>
<body>
<h1>Нотация ходов 3×3</h1>
<table>
  <tr><th>Запись</th><th>Значение</th></tr>
  <tr><td><code>U</code></td><td>Верх по часовой</td></tr>
  <tr><td><code>U'</code></td><td>Верх против часовой</td></tr>
  <tr><td><code>U2</code></td><td>Верх на 180°</td></tr>
  <tr><td><code>R F L B D</code></td><td>То же для других граней</td></tr>
</table>
<p>Смотри с той стороны, где выполняется ход. Маленькие буквы <code>r u</code> — вместе с средним слоем (позже).</p>
</body>
